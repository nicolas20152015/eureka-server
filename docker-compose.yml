version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservicios-net

  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    restart: on-failure
    environment:
      - SPRING_CLOUD_COMPATIBILITY-VERIFIER_ENABLED=false
    networks:
      - microservicios-net

  api-gateway:
    build:
      context: ../ms-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    restart: on-failure
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_COMPATIBILITY-VERIFIER_ENABLED=false
    networks:
      - microservicios-net

  ms-usuarios:
    build:
      context: ../ms-usuarios
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - mysql-db
    restart: on-failure
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/db_usuarios?createDatabaseIfNotExist=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_CLOUD_COMPATIBILITY-VERIFIER_ENABLED=false
    networks:
      - microservicios-net

  ms-catalogo:
    build:
      context: ../ms-catalogo
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - mysql-db
